{% extends "base.html" %}
{% block title %}Login - Login System{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Sign in to your account</p>

        <!--
            ─── LOGIN FORM ───

            FLOW:
            1. User enters email/username + password
            2. JavaScript validates (client-side)
            3. JavaScript sends POST /api/login
            4. Server verifies credentials → creates JWT → sets cookie
            5. Success → redirect to /dashboard
            6. Error → show inline error

            THE MAGIC OF COOKIES:
            After successful login, the server sets Set-Cookie header.
            The browser STORES this cookie.
            On EVERY subsequent request to this domain,
            the browser AUTOMATICALLY includes the cookie.

            The user does NOTHING — cookies just work.
        -->
        <form id="loginForm">
            <div class="form-group">
                <label for="login">Email or Username</label>
                <input
                    type="text"
                    id="login"
                    name="login"
                    placeholder="Enter your email or username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="form-error" id="formError" style="display:none;"></div>

            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                Sign In
            </button>

            <p class="form-footer">
                Don't have an account?
                <a href="/register">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        // ─── PREVENT PAGE RELOAD ───
        e.preventDefault();

        // ─── HIDE PREVIOUS ERRORS ───
        const errorEl = document.getElementById('formError');
        errorEl.style.display = 'none';

        // ─── GET VALUES ───
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;

        // ─── CLIENT VALIDATION ───
        if (!login || !password) {
            errorEl.textContent = 'All fields are required!';
            errorEl.style.display = 'block';
            return;
        }

        // ─── DISABLE BUTTON ───
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            // ─── SEND POST /api/login ───
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });

            const data = await res.json();

            if (res.ok) {
                // ─── LOGIN SUCCESS! ───
                // At this point, the server has set the auth_token cookie.
                // The browser stored it automatically.
                //
                // We can now:
                // 1. Optionally store the token in localStorage for backup
                localStorage.setItem('auth_token', data.token);
                //
                // 2. Redirect to dashboard
                //    The dashboard page will call GET /api/profile
                //    and the browser will AUTOMATICALLY send the cookie.
                //    No manual token handling needed!
                window.location.href = '/dashboard';
            } else {
                // ─── LOGIN FAILED ───
                errorEl.textContent = data.message;
                errorEl.style.display = 'block';
            }
        } catch (err) {
            errorEl.textContent = 'Connection error. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>
{% endblock %}
